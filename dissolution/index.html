<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulation — Dissolution d'un solide ionique</title>
  <meta name="author" content="Mathieu Berdous">
  <meta name="copyright" content="Mathieu Berdous — CC BY-NC 4.0">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<main>

  <!-- ══════════════════════════════════════════════
       COLONNE GAUCHE : image du verre + zone d'animation
  ══════════════════════════════════════════════ -->
  <div id="left-col">

    <div id="anim-area">

      <!-- Panneau image décorative (verre d'eau + sel) — fournie plus tard -->
      <div id="verre-col">
        <div id="verre-placeholder">
          <span id="verre-placeholder-icon">🥛</span>
          Image à venir
        </div>
        <!-- #verre-img-wrap se dimensionne exactement sur l'image affichée
             (cf. CSS) : le cadre de zoom, positionné en % à l'intérieur,
             reste ainsi calé sur l'image quelle que soit sa taille rendue. -->
        <div id="verre-img-wrap">
          <img id="img-verre" src="images/eau_sel.png" alt="Verre d'eau avec du sel au fond">
          <!-- Cadre de zoom (outil dev — cf. devpanel.js / ZOOM_FRAME) -->
          <div id="zoom-frame">
            <div id="zoom-frame-handle" title="Redimensionner"></div>
          </div>
        </div>
      </div>

      <!-- Traits de rappel (géométrie calculée — cf. renderReminderLines()
           dans devpanel.js). Superposés à toute la zone d'animation ;
           coordonnées en % (0-100) via viewBox, recalculées à chaque
           redimensionnement. -->
      <svg id="lines-overlay" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>

      <!-- Canvas de l'animation microscopique -->
      <div id="anim-canvas-wrap">
        <canvas id="anim-canvas"></canvas>
        <!-- Tooltip de coordonnées (temporaire — aide au positionnement pendant le dev) -->
        <div id="coord-tooltip"></div>

        <!-- Chronomètre de la simulation (temporaire) -->
        <div id="sim-timer">0 ms</div>

        <!-- Panneau de réglage (temporaire — retiré une fois le calage terminé) -->
        <div id="dev-panel" class="collapsed">
          <div id="dev-panel-header">
            <span>Réglages (dev)</span>
            <button id="dev-panel-toggle" onclick="toggleDevPanel()">▾</button>
          </div>
          <div id="dev-panel-body"></div>
        </div>

        <!-- Symbole play/pause central (flash bref au clic, mode plein écran) -->
        <div id="fs-center-icon"></div>

        <!-- Barre de contrôle du mode plein écran (masquée hors plein écran,
             s'estompe si la souris est inactive — cf. resize()/fullscreen.js) -->
        <div id="fs-controls">
          <button id="fs-playpause" class="fs-btn" onclick="togglePause()" title="Lecture / Pause">▶</button>
          <input type="range" id="fs-progress-bar" min="0" max="10000" step="10" value="0"
                 oninput="onProgressBarInput(this.value)">
          <span id="fs-progress-time">0 s / 0 s</span>
          <button id="fs-exit" class="fs-btn" onclick="exitFullscreenAnim()" title="Quitter le plein écran">⤢</button>
        </div>
      </div>

    </div><!-- fin #anim-area -->

  </div><!-- fin #left-col -->

  <!-- ══════════════════════════════════════════════
       PANNEAU DROIT
  ══════════════════════════════════════════════ -->
  <div id="panel">

    <!-- ── Onglets principaux ─────────────────── -->
    <div class="panel-main-tabs">
      <button class="panel-main-tab active" id="tab-mecanisme"
              onclick="setMainTab('mecanisme')">
        Mécanisme
      </button>
      <button class="panel-main-tab" id="tab-dissolution"
              onclick="setMainTab('dissolution')">
        Dissolution
      </button>
    </div>

    <!-- ── Corps du panneau ───────────────────── -->
    <div id="panel-body">

      <!-- ═══ Section MÉCANISME ═══ -->
      <div class="panel-main-section" id="section-mecanisme">
        <div class="panel-section">
          <div class="section-title">Contrôles</div>
          <button id="btn-playpause" class="btn btn-play"
                  onclick="togglePause()">▶ Lancer</button>
          <button class="btn btn-raz" style="margin-top:6px;"
                  onclick="resetSimAnim()">↺ Remettre à zéro</button>

          <!-- Barre de progression + temps courant / durée totale -->
          <div class="progress-row">
            <input type="range" id="progress-bar" min="0" max="10000" step="10" value="0"
                   oninput="onProgressBarInput(this.value)">
            <span id="progress-time">0 s / 0 s</span>
          </div>

          <!-- Vitesse de lecture -->
          <div class="speed-row">
            <span class="speed-row-label">Vitesse de lecture :</span>
            <select id="speed-select" onchange="setPlaybackSpeed(this.value)">
              <option value="0.5">×0.5</option>
              <option value="0.75">×0.75</option>
              <option value="1" selected>×1</option>
              <option value="1.5">×1.5</option>
              <option value="2">×2</option>
            </select>
          </div>

          <button class="btn btn-fullscreen" style="margin-top:8px;"
                  onclick="toggleFullscreen()">⛶ Plein écran</button>
        </div>
      </div><!-- fin #section-mecanisme -->

      <!-- ═══ Section DISSOLUTION (à venir) ═══ -->
      <div class="panel-main-section" id="section-dissolution" style="display:none;">
        <div class="coming-soon">
          <div class="coming-soon-icon">🧪</div>
          <div class="coming-soon-title">Bientôt disponible</div>
          <div class="coming-soon-text">Cet onglet est en cours de développement.</div>
        </div>
      </div><!-- fin #section-dissolution -->

    </div><!-- fin #panel-body -->

    <!-- ── Bandeau Instructions ────────────────── -->
    <div class="panel-hint collapsed" id="panel-hint-mecanisme">
      <div class="panel-hint-header">
        <button class="panel-hint-menu-btn"
                onclick="location.href='../index.html'"
                title="Retour au menu principal">☰ Menu</button>
        <span class="panel-hint-title">Instructions</span>
        <button class="panel-hint-toggle"
                onclick="toggleHint('mecanisme')"
                title="Afficher les instructions">▲</button>
      </div>
      <div class="panel-hint-body">
        Cliquez sur <em>▶ Lancer</em> pour observer la dissolution du cristal de
        chlorure de sodium.
      </div>
    </div>

  </div><!-- fin #panel -->

</main>

<!-- ════════════════════════════════════════════════
     Ordre de chargement : sim → cristal → eau → textboxes → ui
════════════════════════════════════════════════ -->
<script src="js/sim.js"></script>
<script src="js/cristal.js"></script>
<script src="js/eau.js"></script>
<script src="js/textboxes.js"></script>
<script src="js/ui.js"></script>
<script src="js/fullscreen.js"></script>
<script src="js/devpanel.js"></script>

<script data-goatcounter="https://berdous-pc.goatcounter.com/count"
        async src="https://gc.zgo.at/count.js"></script>
</body>
</html>
